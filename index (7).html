<!DOCTYPE html>
<html>
<head>
  <title>Sequence 0 to 159</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #00ff99;
      padding: 20px;
    }
    h2 {
      color: #fff;
    }
    pre {
      background: #000;
      padding: 15px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>

<h2>Sequence: n : (n, n+1) up to 159</h2>

<button onclick="generate()">Generate</button>

<pre id="output"></pre>

<script>
function generate() {
  let output = "";

  for (let n = 0; n <= 159; n++) {
    output += n + ":(" + n + "," + (n + 1) + ")\n";
  }

  document.getElementById("output").textContent = output;
}

generate();
</script>

</body>
</html>
